<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - BioWind</title>
    <!-- FontAwesome e Style Global -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="register-body">

    <!-- Cabeçalho idêntico (NavBar sem Links ao Lado Direito Exatamente Feito) -->
    <header class="navbar register-navbar">
        <a href="index.html" class="brand" style="text-decoration: none;">
            <h1>BioWind</h1>
            <span>Logística de Resíduos</span>
        </a>
    </header>

    <main class="main-cadastro">
        <div class="form-wrapper">
            <h2 class="form-title">CADASTRO</h2>
            <form id="registroForm" action="#" method="get">
                <!-- O método GET é usado para enviar dados para o servidor -->

                <!-- Nome Completo (100% largura) -->
                <div class="form-row">
                    <div class="input-pill w-100">
                        <input type="text" id="input-nome" placeholder="NOME COMPLETO" maxlength="70" required>
                    </div>
                </div>

                <!-- CNPJ e Nome Empresa -->
                <div class="form-row">
                    <div class="input-pill w-40">
                        <input type="text" id="input-cnpj" placeholder="CNPJ" maxlength="14"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,14)" required>
                    </div>
                    <div class="input-pill w-60">
                        <input type="text" id="input-empresa" placeholder="NOME DA EMPRESA" maxlength="100" required>
                    </div>
                </div>

                <!-- Telefone e Email Corporativo -->
                <div class="form-row">
                    <div class="input-pill w-40">
                        <input type="tel" id="input-telefone" placeholder="TELEFONE" maxlength="10"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10)" required>
                    </div>
                    <div class="input-pill w-60">
                        <input type="email" id="input-email" placeholder="E-MAIL CORPORATIVO" maxlength="60" required>
                    </div>
                </div>

                <!-- Senha -->
                <div class="form-row">
                    <div class="input-pill w-100">
                        <input type="password" id="input-senha" placeholder="SENHA" maxlength="20" required>
                    </div>
                </div>

                <!-- Botão Concluir com cápsula escura estilo Imagem -->
                <div class="action-row">
                    <button type="button" class="btn-submit" onclick="registerUser()">CONCLUIR</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function getStoredUsers() {
            return JSON.parse(localStorage.getItem('biowind_users') || '[]');
        }

        function saveStoredUsers(users) {
            localStorage.setItem('biowind_users', JSON.stringify(users));
        }

        function addUserToLocalStorage(user) {
            const users = getStoredUsers();
            if (!users.some(u => u.email && u.email.toLowerCase() === user.email.toLowerCase())) {
                users.push(user);
                saveStoredUsers(users);
            }
        }

        function createSession(user) {
            const session = {
                id: user.id,
                email: user.email,
                nome: user.nomeCompleto || user.nome || 'Usuário'
            };
            localStorage.setItem('biowind_session', JSON.stringify(session));
        }

        // Transformamos a função em ASYNC para permitir o uso de await no fetch
        async function registerUser() {
            const nome = document.getElementById('input-nome').value.trim();
            const cnpj = document.getElementById('input-cnpj').value.trim();
            const empresa = document.getElementById('input-empresa').value.trim();
            const telefone = document.getElementById('input-telefone').value.trim();
            const email = document.getElementById('input-email').value.trim().toLowerCase();
            const senha = document.getElementById('input-senha').value;

            // 1. Validações de campos vazios e formatos
            if (!nome || !cnpj || !empresa || !telefone || !email || !senha) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            if (nome.length > 70) {
                alert('O nome completo deve ter no máximo 70 caracteres.');
                return;
            }

            if (empresa.length > 100) {
                alert('O nome da empresa deve ter no máximo 100 caracteres.');
                return;
            }

            if (!/^\d{14}$/.test(cnpj)) {
                alert('O CNPJ deve conter exatamente 14 dígitos numéricos.');
                return;
            }

            if (!/^\d{10}$/.test(telefone)) {
                alert('O telefone deve conter exatamente 10 dígitos numéricos.');
                return;
            }

            if (email.length > 60 || !email.includes('@')) {
                alert('O e-mail corporativo é obrigatório e deve conter @, com no máximo 60 caracteres.');
                return;
            }

            if (senha.length > 20) {
                alert('A senha deve ter no máximo 20 caracteres.');
                return;
            }

            const storedUsers = getStoredUsers();
            if (storedUsers.some(u => u.email && u.email.toLowerCase() === email)) {
                alert('Este e-mail já está cadastrado. Faça login ou use outro e-mail.');
                return;
            }

            // 2. Estrutura de dados idêntica ao que configuramos no seu MockAPI
            const dados = {
                nomeCompleto: nome,
                cnpj,
                tel: telefone,
                senha,
                nomeEmpresa: empresa,
                email
            };

            console.log("Enviando dados para o MockAPI:", dados);

            try {
                // Requisição HTTP POST salvando direto na nuvem do MockAPI
                const response = await fetch('https://6a10aa60d2a9857070370707.mockapi.io/api/v1/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}`);
                }

                const usuarioCriado = await response.json();
                addUserToLocalStorage(usuarioCriado);
                alert('Cadastro enviado com sucesso!');

                // 3. Mantém a lógica original do seu app (Sessão local e Redirecionamento)
                createSession(usuarioCriado);
                window.location.href = 'index.html';

            } catch (error) {
                alert('Erro ao enviar cadastro para o servidor: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('biowind_session');
            if (session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
