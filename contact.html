<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | BioWind</title>
    <!-- Font Awesome para os ícones das redes sociais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonte moderna para estilo profissional -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="contact-page">

    <!-- Cabeçalho Fixo (Estilo E-commerce) -->
    <header class="navbar">
        <div class="brand">
            <h1>BioWind</h1>
            <span>Logística de Resíduos</span>
        </div>
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Voltar ao início
        </a>
    </header>

    <!-- Conteúdo Principal - Tela Única -->
    <main>
        <div class="contact-container">
            <h1 class="contact-title">Entre em Contato</h1>
            
            <div class="social-blocks">
                <!-- WhatsApp -->
                <a href="#" class="social-block whatsapp" target="_blank" title="Falar no WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp</span>
                </a>

                <!-- GitHub -->
                <a href="#" class="social-block github" target="_blank" title="Ver GitHub">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>

                <!-- Instagram -->
                <a href="#" class="social-block instagram" target="_blank" title="Acessar Instagram">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>

                <!-- E-mail (Gmail/Outlook) -->
                <a href="mailto:contato@biowind.com" class="social-block email" title="Enviar E-mail">
                    <i class="fas fa-envelope"></i>
                    <span>E-mail</span>
                </a>
            </div>
        </div>
    </main>

</body>
</html>
