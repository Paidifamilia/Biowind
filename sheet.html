<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papel - Compras e Vendas | BioWind</title>
    <!-- Importação de Ícones (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="wood-page">

    <!-- Cabeçalho / NavBar -->
    <header class="navbar">
        <div class="brand">
            <h1>BioWind</h1>
            <span>Logística de Resíduos</span>
        </div>
        <div class="nav-actions">
            <a href="pay.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
            <a href="historic.html" class="cart-btn" aria-label="Carrinho">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-counter" id="cart-counter" style="display: none;">0</span>
            </a>
            <a href="login.html" class="profile-btn" aria-label="Acessar Cadastro">
                <i class="fas fa-user-circle"></i>
            </a>
        </div>
    </header>

    <main class="marketplace-container">
        <!-- Sidebar de Filtros -->
        <aside class="filters-sidebar">
            <h3>Filtros</h3>
            
            <div class="filter-group">
                <h4>Tipo de Papel</h4>
                <label><input type="checkbox"> Papel Couché</label>
                <label><input type="checkbox"> Papel Offset</label>
                <label><input type="checkbox"> PapelKraft</label>
                <label><input type="checkbox"> Papel Cartão</label>
            </div>

            <div class="filter-group">
                <h4>Preço</h4>
                <div class="price-range">
                    <input type="number" placeholder="Mín">
                    <span>-</span>
                    <input type="number" placeholder="Máx">
                </div>
            </div>
            
            <button class="btn-filter">Aplicar Filtros</button>
        </aside>

        <!-- Área principal de listagem (Estilo OLX / Shopee) -->
        <section class="products-section">
            
            <!-- Barra de Pesquisa -->
            <div class="search-bar-container">
                <input type="text" class="search-input" placeholder="Buscar por papéis...">
                <button class="btn-search"><i class="fas fa-search"></i></button>
            </div>

            <!-- Grid de Produtos -->
            <div class="products-grid"></div>
        </section>
    </main>

    <script>
        //Função para excluir anuncio do card e do localStorage
        function excluirAnuncio(id, btnElement) {
            if(confirm("Tem certeza que deseja excluir este anúncio?")) { // Confirma a exclusão do anuncio
                let ads = JSON.parse(localStorage.getItem('biowind_ads')) || []; // Pega os anuncios do localStorage
                ads = ads.filter(ad => ad.id !== id); // Filtra os anuncios e remove o anuncio com o id informado
                localStorage.setItem('biowind_ads', JSON.stringify(ads)); // Salva os anuncios no localStorage
                
                const card = btnElement.closest('.product-card'); // Seleciona o card do produto
                if(card) { // Se o card existir
                    card.remove(); // Remove o card do produto
                }
            }
        }

        //Função para atualizar o contador do carrinho
        function atualizarContadorCarrinho() { // Atualiza o contador do carrinho
            const cart = JSON.parse(localStorage.getItem('biowind_cart')) || []; // Pega os itens do carrinho do localStorage
            let total = 0; // Inicializa o total
            cart.forEach(item => total += item.quantidade); // Soma a quantidade de cada item
            const counter = document.getElementById('cart-counter'); // Pega o contador do carrinho
            if(counter) { // Se o contador existir
                if(total > 0) { // Se o total for maior que 0
                    counter.innerText = total; // Atualiza o contador do carrinho
                    counter.style.display = 'block'; // Mostra o contador
                } else { // Se o total for menor que 0
                    counter.style.display = 'none'; // Esconde o contador
                }
            }
        }

        //Função para adicionar item ao carrinho
        function adicionarAoCarrinho(id) {
            const ads = JSON.parse(localStorage.getItem('biowind_ads')) || []; // Pega os anuncios do localStorage
            const ad = ads.find(a => a.id === id); // Encontra o anuncio com o id informado
            if(ad) { // Se o anuncio existir
                let cart = JSON.parse(localStorage.getItem('biowind_cart')) || []; // Pega os itens do carrinho do localStorage
                let itemCart = cart.find(item => item.id === id); // Encontra o item com o id informado
                if(itemCart) { // Se o item existir
                    itemCart.quantidade += 1; // Adiciona 1 ao item
                } else { // Se o item não existir
                    cart.push({...ad, quantidade: 1}); // Adiciona o item ao carrinho
                }
                localStorage.setItem('biowind_cart', JSON.stringify(cart)); // Salva os itens do carrinho no localStorage
                atualizarContadorCarrinho(); // Atualiza o contador do carrinho
                alert("Compra adicionada ao carrinho!"); // Mostra um alerta informando que a compra foi adicionada ao carrinho
            }
        }

        //Função para carregar os anuncios quando a página for carregada
        document.addEventListener('DOMContentLoaded', function() {
            atualizarContadorCarrinho(); // Atualiza o contador do carrinho
            const ads = JSON.parse(localStorage.getItem('biowind_ads')) || []; // Pega os anuncios do localStorage
            const productsGrid = document.querySelector('.products-grid'); // Seleciona a grade de produtos
            
            const categoryAds = ads.filter(ad => ad.materialType === 'papel'); // Filtra os anuncios por categoria
            
            categoryAds.reverse().forEach(ad => { // Para cada anuncio da categoria
                const productCard = document.createElement('div'); // Cria um card de produto
                productCard.className = 'product-card'; // Define a classe do card de produto
                productCard.style.position = 'relative'; // Define a posição do card de produto
                
                productCard.innerHTML = `
                    <button onclick="excluirAnuncio(${ad.id}, this)" style="position: absolute; top: 10px; right: 10px; background: rgba(220, 53, 69, 0.9); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: background 0.3s;" onmouseover="this.style.background='rgba(220, 53, 69, 1)'" onmouseout="this.style.background='rgba(220, 53, 69, 0.9)'" title="Excluir Anúncio">
                        <i class="fas fa-trash"></i>
                    </button>
                    <div class="product-image" style="overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 0;">
                        <img src="${ad.imagem}" alt="${ad.nome}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div class="product-info">
                        <h3 class="product-price">R$ ${ad.preco},00 <span>/ un</span></h3>
                        <p class="product-title">${ad.nome}</p>
                        <span class="product-location"><i class="fas fa-map-marker-alt"></i> CEP: ${ad.cep}</span>
                        <button class="btn-buy" onclick="adicionarAoCarrinho(${ad.id})">Comprar</button>
                    </div>
                `;
                productsGrid.insertBefore(productCard, productsGrid.firstChild); // Insere o card de produto na grade
            });
        });
    </script>
</body>
</html>
